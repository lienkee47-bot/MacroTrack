name: Build v2.0.0
on:
  push:
    branches:
      - main # Or your development branch

jobs:
  build:
    name: Build APK and IPA
    runs-on: macos-latest # Required for the iOS build
    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0' # Matches your project version

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Build iOS (No-Sign)
        run: flutter build ios --release --no-codesign
        # Note: This creates an unsigned .app/.ipa for testing. 
        # Full App Store submission requires a developer certificate.

      - name: Upload Artifacts
        uses: actions/upload-artifact@v3
        with:
          name: MacroTrack-v2-Builds
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/ios/iphoneos/*.app